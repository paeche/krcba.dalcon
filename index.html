        html {

        body {
            font-family: Pretendard Variable, Pretendard, -apple-system,

            Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, Apple Color Emoji,
            Segoe UI Emoji, Segoe UI Symbol, sans-serif !important;
        }

        /* Responsive Color Classes (Mobile First) */
        .bg-body-main { background-color: white; }
        .bg-main-table { background-color: #f9fafb; } /* bg-gray-50 */
        
        .text-main { color: #1f2937; } /* text-gray-900 */
        .text-secondary { color: #6b7280; } /* text-gray-500 */
        .text-tertiary { color: #374151; } /* text-gray-700 */

        .link-main { color: #4f46e5; } /* text-indigo-600 */
        .link-main:hover { color: #6366f1; } /* text-indigo-500 */

        .border-main, .divide-main > :not([hidden]) ~ :not([hidden]) { border-color: #e5e7eb; } /* border/divide-gray-200 */
        .ring-main { --tw-ring-color: #e5e7eb; }

        /* Desktop Overrides (451px 이상) */
        @media (min-width: 451px) {
            html {
                --x: calc(var(--posX, 0) * 1px);
                --y: calc(var(--posY, 0) * 1px);
                background-image: 
                    linear-gradient(115deg, rgb(211 255 215), rgb(0 0 0)), 
                    radial-gradient( 90% 100% at calc( 50% + var(--x)) calc( 0% + var(--y)), rgb(200 200 200), rgb(022 000 045)), 
                    radial-gradient(100% 100% at calc( 80% - var(--x)) calc( 0% - var(--y)), rgb(250 255 000), rgb(036 000 000)), 
                    radial-gradient(150% 210% at calc(100% + var(--x)) calc( 0% + var(--y)), rgb(020 175 125), rgb(000 010 255)), 
                    radial-gradient(100% 100% at calc(100% - var(--x)) calc(30% - var(--y)), rgb(255 077 000), rgb(000 200 255)), 
                    linear-gradient(60deg, rgb(255 000 000), rgb(120 086 255));
                background-blend-mode: overlay, overlay, difference, difference, difference, normal;
                background-repeat: no-repeat;
                background-attachment: fixed;
            }
            .bg-body-main { background-color: transparent; }
            .bg-main-table { background-color: transparent; }

            .text-main { color: white; }
            .text-secondary { color: #d1d5db; } /* text-gray-300 */
            .text-tertiary { color: #d1d5db; } /* text-gray-300 */

            .link-main { color: #818cf8; } /* text-indigo-400 */
            .link-main:hover { color: #a5b4fc; } /* text-indigo-300 */

            .border-main, .divide-main > :not([hidden]) ~ :not([hidden]) { border-color: rgba(255, 255, 255, 0.1); }
            .ring-main { --tw-ring-color: rgba(255, 255, 255, 0.1); }
        }

        .disabled {
            background-color: #e9ecef;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .sp {
            width: 18px;
            height: 18px;
            clear: both;
            margin: 20px auto;
        }

        /* Spinner Circle Rotation */
        .sp-circle {
            border: 2px rgba(0, 0, 0, 0.25) solid;
            border-top: 2px black solid;
            border-radius: 50%;
            -webkit-animation: spCircRot 0.6s infinite linear;
            animation: spCircRot 0.6s infinite linear;
        }

        @-webkit-keyframes spCircRot {
            from {
                -webkit-transform: rotate(0deg);
            }
            to {
                -webkit-transform: rotate(359deg);
            }
        }
        @keyframes spCircRot {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(359deg);
            }
        }
    </style>

            <div class="text-center mt-[72px]">
                <h3 class="font-bold text-main">신청이 완료되었습니다!</h3>
                <p class="mt-2 text-secondary">참여해주셔서 감사합니다.</p>
            </div>
            <div id="applicants-table-container" class="mt-10"></div>
            <div id="add-another-app-container" class="flex justify-center mt-16 text-center"></div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading" class="hidden fixed inset-0 bg-gray-50/80 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="flex items-center justify-center max-w-sm mx-4 space-x-2.5 mt-4 mb-16">
            <div class="sp sp-circle"></div>
            <p class="font-medium text-gray-900">신청서를 제출하는 중입니다...</p>
        </div>
    </div>

    <script>
        // GAS 웹앱 API URL (배포된 /exec URL로 교체)
        const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';
        let eventInfo = { success: false, message: '행사 정보를 불러오는 중입니다.' };

        // Cloudflare(정적)에서 GAS API 호출
        async function callGasApi(action, payload) {
            const body = new URLSearchParams();
            body.set('action', action);
            if (payload !== undefined) {
                body.set('payload', JSON.stringify(payload));
            }

            const response = await fetch(GAS_WEBAPP_URL, {
                method: 'POST',
                body
            });

            if (!response.ok) {
                throw new Error(`API 요청 실패: ${response.status}`);
            }

            const text = await response.text();
            return JSON.parse(text);
        }

        // localStorage를 사용한 데이터 저장/불러오기 함수
        function loadSavedData() {
            const savedData = localStorage.getItem('dalcon_form_data');
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    document.getElementById('name').value = data.name || '';
                    document.getElementById('affiliation').value = data.affiliation || '';
                    document.getElementById('position').value = data.position || '';
                    // Set field select value for custom dropdown
                    const fieldInput = document.getElementById('field');
                    const fieldLabel = document.getElementById('field-label');
                    if (data.field && fieldInput && fieldLabel) {
                        fieldInput.value = data.field;
                        fieldLabel.textContent = data.field;
                        // Update selected state after DOM is ready
                        setTimeout(() => {
                            const updateSelectedState = window.updateSelectedState;
                            if (updateSelectedState) {
                                updateSelectedState(data.field);
                            }
                        }, 100);
                    }
                    document.getElementById('email').value = data.email || '';
                    document.getElementById('phone').value = data.phone || '';
                    document.getElementById('save-info').checked = true;
                } catch (e) {
                    console.error('Error loading saved data:', e);
                }
            }
        }

        function saveDataToLocalStorage(formData) {
            if (document.getElementById('save-info').checked) {
                localStorage.setItem('dalcon_form_data', JSON.stringify(formData));
            } else {
                localStorage.removeItem('dalcon_form_data');
            }
        }

        // Load saved data when page loads
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                eventInfo = await callGasApi('getEventInfo');
            } catch (error) {
                console.error('행사 정보 조회 실패:', error);
                eventInfo = { success: false, message: '행사 정보를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.' };
            }

            renderEventInfo();
            if (!eventInfo.success) {
                disableForm();
            }
            loadSavedData();
            
            // Initialize custom dropdown
            const button = document.getElementById('field-button');
            const options = document.getElementById('field-options');
            const label = document.getElementById('field-label');
            const input = document.getElementById('field');
            const optionItems = document.querySelectorAll('.option-item');
            
            // Handle option selection
            optionItems.forEach(item => {
                item.addEventListener('click', function() {
                    const value = this.getAttribute('data-value');
                    const text = this.querySelector('span').textContent;
                    
                    // Remove selected state from all items
                    optionItems.forEach(opt => {
                        const textSpan = opt.querySelector('span');
                        const checkmark = opt.querySelector('span:last-child');
                        opt.classList.remove('bg-indigo-600', 'text-white');
                        textSpan.classList.remove('font-semibold');
                        textSpan.classList.add('font-normal');
                        checkmark.classList.add('hidden');
                        checkmark.classList.remove('text-white');
                        checkmark.classList.add('text-indigo-600');
                    });
                    
                    // Add selected state to clicked item
                    const textSpan = this.querySelector('span');
                    const checkmark = this.querySelector('span:last-child');
                    this.classList.add('bg-indigo-600', 'text-white');
                    textSpan.classList.add('font-semibold');
                    textSpan.classList.remove('font-normal');
                    checkmark.classList.remove('hidden');
                    checkmark.classList.add('text-white');
                    checkmark.classList.remove('text-indigo-600');
                    
                    input.value = value;
                    label.textContent = text;
                    options.classList.add('hidden');
                });
            });
            
            // Function to update selected state when loading from cookies
            function updateSelectedState(selectedValue) {
                if (!selectedValue) return;
                
                optionItems.forEach(item => {
                    const value = item.getAttribute('data-value');
                    const textSpan = item.querySelector('span');
                    const checkmark = item.querySelector('span:last-child');
                    
                    if (value === selectedValue) {
                        // This is the selected item
                        item.classList.add('bg-indigo-600', 'text-white');
                        textSpan.classList.add('font-semibold');
                        textSpan.classList.remove('font-normal');
                        checkmark.classList.remove('hidden');
                        checkmark.classList.add('text-white');
                        checkmark.classList.remove('text-indigo-600');
                    } else {
                        // This is not selected
                        item.classList.remove('bg-indigo-600', 'text-white');
                        textSpan.classList.remove('font-semibold');
                        textSpan.classList.add('font-normal');
                        checkmark.classList.add('hidden');
                        checkmark.classList.remove('text-white');
                        checkmark.classList.add('text-indigo-600');
                    }
                });
            }
            
            // Make function globally accessible
            window.updateSelectedState = updateSelectedState;
            
            // Show selected state when dropdown opens
            button.addEventListener('click', function() {
                options.classList.toggle('hidden');
                if (!options.classList.contains('hidden')) {
                    updateSelectedState(input.value);
                }
            });

            // 미리보기 버튼 이벤트 리스너 추가
            document.getElementById('preview-participants-btn').addEventListener('click', function() {
                showParticipantsPreview();
            });
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function(e) {
                if (!button.contains(e.target) && !options.contains(e.target)) {
                    options.classList.add('hidden');
                }
            });

            // 데스크톱에서만 배경 애니메이션 이벤트 리스너 추가
            if (window.matchMedia("(min-width: 451px)").matches) {
                document.documentElement.addEventListener("mousemove", e => {
                    const { currentTarget: el, clientX: x, clientY: y } = e;
                    // 뷰포트 기준 좌표를 사용하도록 수정하여 스크롤 시 배경이 점프하는 현상 방지
                    const w = window.innerWidth;
                    const h = window.innerHeight;
                    el.style.setProperty('--posX', x - w / 2);
                    el.style.setProperty('--posY', y - h / 2);
                });

                document.documentElement.addEventListener("touchmove", e => {
                    if (e.touches.length > 0) {
                        const touch = e.touches[0];
                        const x = touch.clientX;
                        const y = touch.clientY;
                        const el = e.currentTarget;
                         // 뷰포트 기준 좌표를 사용하도록 수정하여 스크롤 시 배경이 점프하는 현상 방지
                        const w = window.innerWidth;
                        const h = window.innerHeight;
                        el.style.setProperty('--posX', x - w / 2);
                        el.style.setProperty('--posY', y - h / 2);
                    }
                }, { passive: true });
            }
        });

        function renderEventInfo() {
            const container = document.getElementById('event-info-container');
            const mainTitle = document.getElementById('main-title');

            if (eventInfo.success) {
                const event = eventInfo.event;
                
                mainTitle.textContent = `제${event.round}회 달콘데이 참가 신청`;

                // 날짜 포맷팅
                let eventDateDisplay = null;
                if (event.eventDate) {
                    const dateOnly = new Date(event.eventDate).toLocaleDateString('ko-KR', {
                        year: 'numeric', 
                        month: 'long', 
                        day: 'numeric', 
                        weekday: 'long'
                    });
                    
                    // 시작시간과 종료시간이 있으면 추가
                    if (event.startTime && event.endTime) {
                        // 시간 데이터를 문자열로 변환하는 함수
                        function formatTimeString(timeData) {
                            if (!timeData) return '';
                            
                            // Date 객체인 경우 - 시간과 분만 추출
                            if (timeData instanceof Date) {
                                const hours = timeData.getHours().toString().padStart(2, '0');
                                const minutes = timeData.getMinutes().toString().padStart(2, '0');
                                return `${hours}:${minutes}`;
                            }
                            
                            // 문자열인 경우
                            if (typeof timeData === 'string') {
                                // 이미 HH:MM 형식인지 확인
                                if (/^\d{1,2}:\d{2}$/.test(timeData)) {
                                    return timeData;
                                }
                                
                                // ISO 문자열이나 다른 날짜 형식인 경우 Date로 파싱
                                try {
                                    const parsed = new Date(timeData);
                                    if (!isNaN(parsed.getTime())) {
                                        const hours = parsed.getHours().toString().padStart(2, '0');
                                        const minutes = parsed.getMinutes().toString().padStart(2, '0');
                                        return `${hours}:${minutes}`;
                                    }
                                } catch (e) {
                                    // 파싱 실패시 원본 문자열 반환
                                    return timeData;
                                }
                                
                                // 시간만 포함된 문자열 처리 (예: "14:30:00")
                                const timeMatch = timeData.match(/(\d{1,2}):(\d{2})/);
                                if (timeMatch) {
                                    return `${timeMatch[1].padStart(2, '0')}:${timeMatch[2]}`;
                                }
                            }
                            
                            return timeData.toString();
                        }
                        
                        const startTimeStr = formatTimeString(event.startTime);
                        const endTimeStr = formatTimeString(event.endTime);
                        
                        eventDateDisplay = `${dateOnly} (${startTimeStr}~${endTimeStr})`;
                    } else {
                        eventDateDisplay = dateOnly;
                    }
                }

                container.innerHTML = `
                  <div>
                    <div class="border-y border-main">
                      <dl class="divide-y divide-main">
                        ${event.title ? `
                        <div class="py-1.5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
                          <dt class="text-sm font-medium leading-6 text-tertiary">주제</dt>
                          <dd class="text-sm leading-6 text-main sm:col-span-2 sm:mt-0">${event.title}</dd>
                        </div>
                        ` : ''}
                        ${eventDateDisplay ? `
                        <div class="py-1.5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
                          <dt class="text-sm font-medium leading-6 text-tertiary">행사일</dt>
                          <dd class="text-sm leading-6 text-main sm:col-span-2 sm:mt-0">${eventDateDisplay}</dd>
                        </div>
                        ` : ''}
                        ${event.instructor ? `
                        <div class="py-1.5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
                          <dt class="text-sm font-medium leading-6 text-tertiary">강사</dt>
                          <dd class="text-sm leading-6 text-main sm:col-span-2 sm:mt-0">${event.instructor}</dd>
                        </div>
                        ` : ''}
                        ${event.participantCount ? `
                        <div class="py-1.5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
                          <dt class="text-sm font-medium leading-6 text-tertiary">참여인원</dt>
                          <dd class="text-sm leading-6 text-main sm:col-span-2 sm:mt-0">${event.participantCount}</dd>
                        </div>
                        ` : ''}
                        ${event.location ? `
                        <div class="py-1.5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
                          <dt class="text-sm font-medium leading-6 text-tertiary">장소</dt>
                          <dd class="text-sm leading-6 text-main sm:col-span-2 sm:mt-0">${event.location}</dd>
                        </div>
                        ` : ''}
                        ${event.description ? `
                        <div class="py-1.5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
                          <dt class="text-sm font-medium leading-6 text-tertiary">한줄 소개</dt>
                          <dd class="text-sm leading-6 text-main sm:col-span-2 sm:mt-0">${event.description}</dd>
                        </div>
                        ` : ''}
                        ${event.link ? `
                        <div class="py-1.5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
                          <dt class="text-sm font-medium leading-6 text-tertiary">자세히</dt>
                          <dd class="text-sm leading-6 sm:col-span-2 sm:mt-0">
                            <a href="${event.link}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-x-1 link-main">
                              <span>링크 바로가기</span>
                              <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
                              </svg>
                            </a>
                          </dd>
                        </div>
                        ` : ''}
                        ${event.contact ? `
                        <div class="py-1.5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-0">
                          <dt class="text-sm font-medium leading-6 text-tertiary">문의</dt>
                          <dd class="text-sm leading-6 text-main sm:col-span-2 sm:mt-0">${event.contact}</dd>
                        </div>
                        ` : ''}
                      </dl>
                    </div>
                  </div>
              `;
            } else {
                container.innerHTML = `
                    <p class="font-medium text-center text-tertiary text-sm/6">${eventInfo.message}</p>
                `;
            }
        }

        // 미리보기 모드로 참여자 현황 보기
        async function showParticipantsPreview() {
            // ✨ 모집 중이 아닐 때 즉시 차단
            if (!eventInfo.success) {
              showNotification('현재 모집 중인 행사가 없어 참여자 현황을 확인할 수 없습니다.', 'error');
              return; // 여기서 함수 종료
            }

            // 폼과 헤더, 행사정보 숨기기
            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('event-info-container').classList.add('hidden');
            document.getElementById('form-container').classList.add('hidden');
            
            // 성공 메시지 및 참여자 목록 표시 (미리보기 모드)
            const successContainer = document.getElementById('success-container');
            successContainer.classList.remove('hidden');
            
            // 미리보기 모드임을 알리는 메시지로 변경
            const successMessage = successContainer.querySelector('h3');
            const successSubMessage = successContainer.querySelector('p');
            successMessage.textContent = '참여자 현황';
            successSubMessage.textContent = '현재까지 신청하신 분들의 현황입니다.';
            
            // ✨ 버튼 컨테이너 먼저 비우기
            document.getElementById('add-another-app-container').innerHTML = '';
            
            // 참여자 목록 로딩 UI 표시
            const applicantsContainer = document.getElementById('applicants-table-container');
            applicantsContainer.innerHTML = `
                <p class="text-center text-gray-400">참여자 목록을 불러오는 중...</p>
                <div class="flex justify-center items-center py-4">
                    <div class="sp sp-circle" style="margin: 0;"></div>
                </div>
            `;

            // 최신 참여자 목록 가져오기 (현재 회차 정보 전달)
            try {
                const result = await callGasApi('getRecentApplicants', { round: eventInfo.event.round });
                renderApplicantsTablePreview(result);
            } catch (error) {
                console.error('참여자 목록 조회 실패:', error);
                renderApplicantsTablePreview({ success: false, applicants: [] });
            }
        }

        // 미리보기 모드용 참여자 테이블 렌더링
        function renderApplicantsTablePreview(result) {
            const container = document.getElementById('applicants-table-container');
            if (!result.success) {
                container.innerHTML = `<p class="text-red-500 text-sm">참여자 목록을 불러오는 데 실패했습니다.</p>`;
                renderBackButton(); // 실패 시에도 뒤로가기 버튼은 표시
                return;
            }

            const applicants = result.applicants;
            if (applicants.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-center">아직 등록된 참여자가 없습니다.</p>`;
            } else {
                let tableHtml = `
                    <div class="flow-root">
                        <div class="overflow-x-auto sm:mx-auto sm:w-full sm:max-w-sm">
                            <div class="inline-block py-2 align-middle w-full">
                                <h4 class="text-sm font-semibold leading-7 mb-2 text-main">현재 참여자 현황 (${applicants.length}명)</h4>
                                <div class="ring-1 ring-main min-w-full max-h-[300px] overflow-y-auto">
                                    <table class="min-w-full divide-y divide-main">
                                        <thead class="bg-main-table">
                                            <tr>
                                                <th scope="col" class="py-1.5 pl-4 pr-3 text-left text-sm font-semibold text-main sm:pl-6">이름</th>
                                                <th scope="col" class="px-3 py-1.5 text-left text-sm font-semibold text-main">소속</th>
                                                <th scope="col" class="px-3 py-1.5 text-left text-sm font-semibold text-main">직위</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-main">
                `;

                applicants.forEach(applicant => {
                    tableHtml += `
                                            <tr>
                                                <td class="whitespace-nowrap py-1.5 pl-4 pr-3 text-sm font-medium text-main sm:pl-6">${applicant.name}</td>
                                                <td class="whitespace-nowrap px-3 py-1.5 text-sm text-secondary">${applicant.affiliation}</td>
                                                <td class="whitespace-nowrap px-3 py-1.5 text-sm text-secondary">${applicant.position}</td>
                                            </tr>
                    `;
                });

                tableHtml += `
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML = tableHtml;
            }
            // 뒤로가기 버튼 렌더링
            renderBackButton();
        }

        // 뒤로가기 버튼 렌더링
        function renderBackButton() {
            const container = document.getElementById('add-another-app-container');
            container.innerHTML = `
                <button id="back-btn" type="button" class="flex items-center space-x-1.5 rounded-md bg-gray-50 px-3.5 py-2.5 text-sm font-semibold shadow-sm hover:bg-gray-100 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 -ml-0.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 15.75 3 12m0 0 3.75-3.75M3 12h18" />
                    </svg>
                    <div>뒤로가기</div>
                </button>
            `;

            document.getElementById('back-btn').addEventListener('click', function() {
                // 성공 화면 숨기기
                document.getElementById('success-container').classList.add('hidden');
                
                // 메인 헤더, 행사 정보, 폼 다시 보이기
                document.getElementById('main-header').classList.remove('hidden');
                document.getElementById('event-info-container').classList.remove('hidden');
                document.getElementById('form-container').classList.remove('hidden');

                // 테이블 내용 비우기
                document.getElementById('applicants-table-container').innerHTML = '';
                
                // 성공 메시지를 원래대로 복원 (다음 신청 완료를 위해)
                const successContainer = document.getElementById('success-container');
                const successMessage = successContainer.querySelector('h3');
                const successSubMessage = successContainer.querySelector('p');
                successMessage.textContent = '신청이 완료되었습니다!';
                successSubMessage.textContent = '참여해주셔서 감사합니다.';
            });
        }

        function disableForm() {
            const form = document.getElementById('dalConForm');
            const inputs = form.querySelectorAll('input, button');
            inputs.forEach(input => {
                input.disabled = true;
                input.classList.add('disabled');
            });

            const fieldButton = document.getElementById('field-button');
            if (fieldButton) {
                fieldButton.classList.add('disabled');
            }
        }

        // Form submission handler
        document.getElementById('dalConForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // ✨ 이미 제출 중인지 확인
            const submitButton = this.querySelector('button[type="submit"]');
            if (submitButton.disabled) {
                return; // 이미 제출 중이면 무시
            }
            
            // ✨ 즉시 버튼 비활성화 및 텍스트 변경
            submitButton.disabled = true;
            submitButton.innerHTML = `
                <div class="flex items-center justify-center space-x-2">
                    <div class="sp sp-circle" style="margin: 0; width: 16px; height: 16px;"></div>
                    <span>처리 중...</span>
                </div>
            `;
            
            // Show loading
            const loadingElement = document.getElementById('loading');
            loadingElement.classList.remove('hidden');
            
            // Get field value from custom dropdown
            const fieldInput = document.getElementById('field');
            const fieldValue = fieldInput.value || '';
            
            // Collect form data
            const formData = {
                name: document.getElementById('name').value,
                affiliation: document.getElementById('affiliation').value,
                position: document.getElementById('position').value,
                field: fieldValue,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
            };
            
            // Validate field selection
            if (!fieldValue) {
                loadingElement.classList.add('hidden');
                resetSubmitButton(submitButton); // ✨ 버튼 복원
                showNotification('분야를 선택해주세요.', 'error');
                return;
            }
            
            // Save to localStorage if checkbox is checked
            saveDataToLocalStorage(formData);
            
            try {
                const result = await callGasApi('submitForm', formData);
                loadingElement.classList.add('hidden');

                if (result.success) {
                    // 성공 시에는 버튼을 복원하지 않음 (페이지가 전환되므로)
                    showNotification(result.message, 'success');

                    // 폼과 헤더, 행사정보 숨기기
                    document.getElementById('main-header').classList.add('hidden');
                    document.getElementById('event-info-container').classList.add('hidden');
                    document.getElementById('form-container').classList.add('hidden');

                    // 성공 메시지 및 참여자 목록 표시
                    const successContainer = document.getElementById('success-container');
                    successContainer.classList.remove('hidden');

                    // ✨ 신청 완료 모드임을 알리는 메시지로 설정
                    const successMessage = successContainer.querySelector('h3');
                    const successSubMessage = successContainer.querySelector('p');
                    successMessage.textContent = '신청이 완료되었습니다!';
                    successSubMessage.textContent = '참여해주셔서 감사합니다.';

                    // ✨ 버튼 컨테이너 먼저 비우기
                    document.getElementById('add-another-app-container').innerHTML = '';

                    // 참여자 목록 로딩 UI 표시
                    const applicantsContainer = document.getElementById('applicants-table-container');
                    applicantsContainer.innerHTML = `
                        <p class="text-center text-gray-400">참여자 목록을 불러오는 중...</p>
                        <div class="flex justify-center items-center py-4">
                            <div class="sp sp-circle" style="margin: 0;"></div>
                        </div>
                    `;

                    // 최신 참여자 목록 가져오기 (현재 회차 정보 전달)
                    try {
                        const applicantsResult = await callGasApi('getRecentApplicants', { round: eventInfo.event.round });
                        renderApplicantsTable(applicantsResult);
                    } catch (applicantsError) {
                        console.error('참여자 목록 조회 실패:', applicantsError);
                        renderApplicantsTable({ success: false, applicants: [] });
                    }

                    if (!document.getElementById('save-info').checked) {
                        document.getElementById('dalConForm').reset();
                        fieldInput.value = '';
                        document.getElementById('field-label').textContent = '분야를 선택해주세요';
                        // Clear selected state from all options
                        const allOptions = document.querySelectorAll('.option-item');
                        allOptions.forEach(opt => {
                            const textSpan = opt.querySelector('span');
                            const checkmark = opt.querySelector('span:last-child');
                            opt.classList.remove('bg-indigo-600', 'text-white');
                            textSpan.classList.remove('font-semibold');
                            textSpan.classList.add('font-normal');
                            checkmark.classList.add('hidden');
                            checkmark.classList.remove('text-white');
                            checkmark.classList.add('text-indigo-600');
                        });
                    }
                } else {
                    resetSubmitButton(submitButton); // ✨ 실패 시 버튼 복원
                    showNotification(result.message, 'error');
                }
            } catch (error) {
                // Handle failure
                loadingElement.classList.add('hidden');
                resetSubmitButton(submitButton); // ✨ 오류 시 버튼 복원
                showNotification('신청 중 오류가 발생했습니다. 다시 시도해주세요.', 'error');
                console.error('Error:', error);
            }
        });

        // ✨ 제출 버튼 복원 함수
        function resetSubmitButton(submitButton) {
            submitButton.disabled = false;
            submitButton.innerHTML = '신청서 제출';
        }

        function renderApplicantsTable(result) {
            const container = document.getElementById('applicants-table-container');
            if (!result.success) {
                container.innerHTML = `<p class="text-red-500 text-sm">참여자 목록을 불러오는 데 실패했습니다.</p>`;
                renderAddAnotherButton(); // 실패 시에도 추가 신청 버튼은 표시
                return;
            }

            const applicants = result.applicants;
            if (applicants.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-center">아직 등록된 참여자가 없습니다.</p>`;
            } else {
                let tableHtml = `
                    <div class="flow-root">
                        <div class="overflow-x-auto sm:mx-auto sm:w-full sm:max-w-sm">
                            <div class="inline-block py-2 align-middle w-full">
                                <h4 class="text-sm font-semibold leading-7 mb-2 text-main">최근 참여자 현황 (${applicants.length}명)</h4>
                                <div class="ring-1 ring-main min-w-full max-h-[300px] overflow-y-auto">
                                    <table class="min-w-full divide-y divide-main">
                                        <thead class="bg-main-table">
                                            <tr>
                                                <th scope="col" class="py-1.5 pl-4 pr-3 text-left text-sm font-semibold text-main sm:pl-6">이름</th>
                                                <th scope="col" class="px-3 py-1.5 text-left text-sm font-semibold text-main">소속</th>
                                                <th scope="col" class="px-3 py-1.5 text-left text-sm font-semibold text-main">직위</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-main">
                `;

                applicants.forEach(applicant => {
                    tableHtml += `
                                            <tr>
                                                <td class="whitespace-nowrap py-1.5 pl-4 pr-3 text-sm font-medium text-main sm:pl-6">${applicant.name}</td>
                                                <td class="whitespace-nowrap px-3 py-1.5 text-sm text-secondary">${applicant.affiliation}</td>
                                                <td class="whitespace-nowrap px-3 py-1.5 text-sm text-secondary">${applicant.position}</td>
                                            </tr>
                    `;
                });

                tableHtml += `
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML = tableHtml;
            }
            // 추가 신청 버튼 렌더링
            renderAddAnotherButton();
        }

        function renderAddAnotherButton() {
            const container = document.getElementById('add-another-app-container');
            container.innerHTML = `
                <button id="add-another-app-btn" type="button" class="rounded-md bg-indigo-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
                    추가 신청하기
                </button>
            `;

            document.getElementById('add-another-app-btn').addEventListener('click', function() {
                // 성공 화면 숨기기
                document.getElementById('success-container').classList.add('hidden');
                
                // 메인 헤더, 행사 정보, 폼 다시 보이기
                document.getElementById('main-header').classList.remove('hidden');
                document.getElementById('event-info-container').classList.remove('hidden');
                document.getElementById('form-container').classList.remove('hidden');

                // ✨ 제출 버튼 상태 초기화
                const submitButton = document.querySelector('button[type="submit"]');
                if (submitButton) {
                    resetSubmitButton(submitButton);
                }

                // 테이블 내용 비우기
                document.getElementById('applicants-table-container').innerHTML = '';
                document.getElementById('add-another-app-container').innerHTML = '';
            });
        }
        
        // Notification function with Tailwind styling
        function showNotification(message, type) {
            const notification = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200';
            const textColor = type === 'success' ? 'text-green-800' : 'text-red-800';
            const iconColor = type === 'success' ? 'text-green-400' : 'text-red-400';
            const icon = type === 'success' ? 
                '<svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>' :
                '<svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>';
            
            notification.innerHTML = `
                <div class="fixed top-6 inset-x-0 z-50 flex justify-center px-6 pointer-events-none">
                    <div class="pointer-events-auto w-full max-w-sm rounded-md border p-4 ${bgColor}">
                        <div class="flex">
                            <div class="flex-shrink-0">
                                <div class="${iconColor}">${icon}</div>
                            </div>
                            <div class="ml-3">
                                <p class="text-sm font-medium ${textColor}">${message}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                notification.remove();
            }, 5000);
        }
    </script>
</body>
</html>
